<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إعادة تعيين كلمة المرور</title>
   <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

  <div class="card">

    <div class="icon-circle">
      <!-- قفل -->
      <svg viewBox="0 0 24 24">
        <path d="M7 11V8a5 5 0 0 1 10 0v3"/>
        <rect x="5" y="11" width="14" height="10" rx="2"/>
      </svg>
    </div>

    <h2>إعادة تعيين كلمة المرور</h2>

    <p class="subtitle">
      أدخل كلمة المرور الجديدة لتأمين حسابك
    </p>

    <div class="input-box">
      <span class="icon">
        <!-- كلمة مرور -->
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/>
        </svg>
      </span>
      <input type="password" placeholder="كلمة المرور الجديدة" id="newPassword">
    </div>

    <div class="input-box">
      <span class="icon">
        <!-- تأكيد -->
        <svg viewBox="0 0 24 24">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </span>
      <input type="password" placeholder="تأكيد كلمة المرور" id="ConfirmPassword">
    </div>

    <button class="btn" onclick="resetPassword()">
      حفظ التغيير
    </button>

  </div>

</div>
<script>

let resetToken = ""; // لو عندك توكن من backend

async function resetPassword() {

  // 🔥 جلب التوكن من الرابط
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    alert("التوكن غير موجود في الرابط ❌");
    return;
  }

  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!newPassword || !confirmPassword) {
    alert("من فضلك املئي كل الحقول");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("كلمة المرور غير متطابقة ❌");
    return;
  }

  try {

    const response = await fetch("https://empath-ai.runasp.net/api/User/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        Token: token,
        Password: newPassword,
        Confirm_Password: confirmPassword
      })
    });

    const result = await response.text();
    console.log("📥 Response:", result);

    if (response.ok) {
      alert("تم تغيير كلمة المرور ✔️");
    } else {
      alert(result); // هيعرض سبب الخطأ من السيرفر
    }

  } catch (error) {
    console.error(error);
    alert("حدث خطأ في الاتصال بالسيرفر ❌");
  }

  console.log("📥 Token:", token);
  console.log("📥 New Password:", newPassword);
  console.log("📥 Confirm Password:", confirmPassword);
}
</script>
</body>
</html>
