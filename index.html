<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إعادة تعيين كلمة المرور</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h2>إعادة تعيين كلمة المرور</h2>

    <div class="input-box">
      <input type="password" placeholder="كلمة المرور الجديدة" id="newPassword">
    </div>

    <div class="input-box">
      <input type="password" placeholder="تأكيد كلمة المرور" id="confirmPassword">
    </div>

    <button class="btn" onclick="resetPassword()">
      حفظ التغيير
    </button>

  </div>

</div>

<script>

async function resetPassword() {

  // 🔥 قراءة التوكن من الرابط
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    alert("التوكن غير موجود في الرابط ❌");
    return;
  }

  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!newPassword || !confirmPassword) {
    alert("من فضلك املئي كل الحقول");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("كلمة المرور غير متطابقة ❌");
    return;
  }

  try {

    const response = await fetch("https://empath-ai.runasp.net/api/User/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        Token: token,
        Password: newPassword,
        Confirm_Password: confirmPassword
      })
    });

    const result = await response.text();
    console.log("Response:", result);

    if (response.ok) {
      alert("تم تغيير كلمة المرور ✔️");
      window.location.href = "login.html"; // اختياري
    } else {
      alert(result);
    }

  } catch (error) {
    console.error(error);
    alert("حدث خطأ في الاتصال بالسيرفر ❌");
  }
}

</script>

</body>
</html>
